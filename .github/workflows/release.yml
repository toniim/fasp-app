name: Release

# Cut a release by pushing a tag that matches the version in version.go, e.g.
#   ./scripts/release.sh
# This builds the Windows app and publishes a GitHub Release with the binaries.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> "$GITHUB_PATH"

      - name: Build Windows app
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S')
          GIT_COMMIT=$(git rev-parse HEAD)
          echo "Building $VERSION ($GIT_COMMIT)"
          # -webview2 download: the installer fetches & installs the WebView2
          # runtime from Microsoft at install time if it isn't already present.
          wails build -platform windows/amd64 -nsis -webview2 download -ldflags "\
            -X 'github.com/heytonyne/fasp/internal/version.Version=${VERSION}' \
            -X 'github.com/heytonyne/fasp/internal/version.BuildTime=${BUILD_TIME}' \
            -X 'github.com/heytonyne/fasp/internal/version.GitCommit=${GIT_COMMIT}'"

      # --- Optional code signing via SignPath (free for OSS) ---
      # Skipped unless the repo variable SIGNPATH_ORGANIZATION_ID is set, so the
      # release stays green (publishing unsigned) until SignPath is configured.
      # To enable, set repo variables SIGNPATH_ORGANIZATION_ID,
      # SIGNPATH_PROJECT_SLUG, SIGNPATH_POLICY_SLUG and secret SIGNPATH_API_TOKEN.
      - name: Upload unsigned artifact (for SignPath)
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows
          path: |
            build/bin/fasp.exe
            build/bin/fasp-amd64-installer.exe

      - name: Sign with SignPath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          # Overwrite the unsigned binaries with the signed ones so the publish
          # step below uploads the signed versions.
          output-artifact-directory: build/bin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/fasp.exe
            build/bin/*-installer.exe
